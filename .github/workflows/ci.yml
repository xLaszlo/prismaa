name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --locked --group dev
      - run: uv run --locked ruff format --check .
      - run: uv run --locked ruff check .

  test:
    name: Test SQLite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Prisma CLI
        run: npm ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: uv sync --locked --group dev

      - name: Generate test client
        run: uv run --locked aprisma generate --schema tests/fixtures/schema.prisma --output tests/prisma

      - name: Run tests
        run: uv run --locked pytest --cov=aprisma --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          file: coverage.xml
          fail_ci_if_error: false

  test-postgres:
    name: Test PostgreSQL (Python 3.13)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aprisma
          POSTGRES_PASSWORD: aprisma
          POSTGRES_DB: aprisma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://aprisma:aprisma@localhost:5432/aprisma_test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Prisma CLI
        run: npm ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: uv sync --locked --group dev

      - name: Generate test client
        run: uv run --locked aprisma generate --schema tests/fixtures/schema.prisma --output tests/prisma

      - name: Run tests against PostgreSQL
        run: uv run --locked pytest tests/integration/ -v
