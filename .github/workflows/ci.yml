name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version  # reads .node-version (currently 22)
          cache: npm

      - name: Install Prisma CLI
        run: npm ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Generate test client
        run: uv run prismaa generate --schema tests/fixtures/schema.prisma --output tests/prisma

      - name: Run tests
        run: uv run pytest --cov=prismaa --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          file: coverage.xml
          fail_ci_if_error: false
